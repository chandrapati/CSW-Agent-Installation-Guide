#cloud-config
# Azure custom_data — install CSW sensor on RHEL 9.
# Pattern A from cloud/02-azure-customdata.md (CSW-generated
# installer script from private blob).
#
# Pre-requisites baked into the VM resource:
#   - User-assigned managed identity attached
#   - Identity has Storage Blob Data Reader on the agents container

write_files:
  - path: /usr/local/sbin/install-csw.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euxo pipefail
      exec > /var/log/csw-customdata.log 2>&1

      readonly BLOB_URL_INSTALLER="https://internalcswagents.blob.core.windows.net/agents/linux/tetration_linux_installer.sh"

      sleep 30   # let managed identity propagate

      STORAGE_TOKEN=$(curl -s -H 'Metadata: true' \
        'http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://storage.azure.com/' \
        | python3 -c 'import sys,json;print(json.load(sys.stdin)["access_token"])')

      # Pull Cisco-generated installer script. Treat this script as
      # a secret because it embeds activation material.
      curl -s -L -H "Authorization: Bearer $STORAGE_TOKEN" -H "x-ms-version: 2019-12-12" \
        -o /tmp/tetration_linux_installer.sh "$BLOB_URL_INSTALLER"

      chmod 700 /tmp/tetration_linux_installer.sh
      bash /tmp/tetration_linux_installer.sh

      rm -f /tmp/tetration_linux_installer.sh
      echo "CSW sensor install complete at $(date -u +%FT%TZ)"

runcmd:
  - /usr/local/sbin/install-csw.sh
