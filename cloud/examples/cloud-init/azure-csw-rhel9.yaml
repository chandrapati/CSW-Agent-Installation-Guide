#cloud-config
# Azure custom_data — install CSW sensor on RHEL 9.
# Pattern A from cloud/02-azure-customdata.md (payload from private blob).
#
# Pre-requisites baked into the VM resource:
#   - User-assigned managed identity attached
#   - Identity has Storage Blob Data Reader on the agents container
#   - Identity has Key Vault Secrets User on the activation-key secret

write_files:
  - path: /usr/local/sbin/install-csw.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euxo pipefail
      exec > /var/log/csw-customdata.log 2>&1

      readonly BLOB_URL_PKG="https://internalcswagents.blob.core.windows.net/agents/linux/el9/tet-sensor-3.10.1.45-1.el9.x86_64.rpm"
      readonly BLOB_URL_CA="https://internalcswagents.blob.core.windows.net/agents/linux/ca.pem"
      readonly KV_NAME="csw-prod-kv"
      readonly KV_SECRET="activation-key-prod-web"
      readonly CSW_SCOPE="prod:web-tier"

      sleep 30   # let managed identity propagate

      STORAGE_TOKEN=$(curl -s -H 'Metadata: true' \
        'http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://storage.azure.com/' \
        | python3 -c 'import sys,json;print(json.load(sys.stdin)["access_token"])')

      mkdir -p /etc/tetration && chmod 750 /etc/tetration

      curl -s -L -H "Authorization: Bearer $STORAGE_TOKEN" -H "x-ms-version: 2019-12-12" \
        -o /tmp/tet-sensor.rpm "$BLOB_URL_PKG"

      curl -s -L -H "Authorization: Bearer $STORAGE_TOKEN" -H "x-ms-version: 2019-12-12" \
        -o /etc/tetration/ca.pem "$BLOB_URL_CA"

      KV_TOKEN=$(curl -s -H 'Metadata: true' \
        'http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://vault.azure.net' \
        | python3 -c 'import sys,json;print(json.load(sys.stdin)["access_token"])')

      ACTIVATION_KEY=$(curl -s -H "Authorization: Bearer $KV_TOKEN" \
        "https://${KV_NAME}.vault.azure.net/secrets/${KV_SECRET}?api-version=7.4" \
        | python3 -c 'import sys,json;print(json.load(sys.stdin)["value"])')

      cat > /etc/tetration/sensor.conf <<EOF
      ACTIVATION_KEY=$ACTIVATION_KEY
      SCOPE=$CSW_SCOPE
      EOF
      chmod 640 /etc/tetration/sensor.conf

      dnf install -y /tmp/tet-sensor.rpm
      systemctl enable --now csw-agent

      rm -f /tmp/tet-sensor.rpm
      echo "CSW sensor install complete at $(date -u +%FT%TZ)"

runcmd:
  - /usr/local/sbin/install-csw.sh
