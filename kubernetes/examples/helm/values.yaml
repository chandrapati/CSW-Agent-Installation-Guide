# Example Helm values for the CSW sensor chart.
#
# This is a representative shape — actual field names depend on the
# chart version that Cisco publishes for your CSW release. Cross-check
# the values produced by `helm show values csw/sensor` against this file.

# ---- Image -----------------------------------------------------------------
image:
  repository: registry.internal.example.com/csw/sensor
  tag: 3.x.y.z
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: internal-registry-pull

# ---- ServiceAccount --------------------------------------------------------
serviceAccount:
  create: false   # we created it explicitly so the OpenShift SCC binding sticks
  name: csw-sensor

# ---- Cluster connection ----------------------------------------------------
cluster:
  # Reference a Secret rather than inlining secrets here. The Secret was
  # created with: kubectl create secret generic csw-sensor-config \
  #   --from-literal=cluster_endpoint=csw.example.com \
  #   --from-literal=activation_key=<key> \
  #   --from-file=ca.pem=./ca.pem
  configFromSecret:
    name: csw-sensor-config
    activationKeyKey: activation_key
    endpointKey: cluster_endpoint
    caBundleKey: ca.pem

  # Scope label applied at first registration
  scope: "prod:k8s-cluster-A"

# ---- Sensor pod settings ---------------------------------------------------
sensor:
  hostNetwork: true
  hostPID: true
  privileged: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Tolerate every taint so the sensor lands on every node, including
  # control-plane and dedicated node pools.
  tolerations:
    - operator: Exists

  # Optional: only schedule on nodes labelled csw-sensor-wave: <n>
  # nodeSelector:
  #   csw-sensor-wave: "1"

  # Required for Linux nodes
  hostPaths:
    proc: /proc
    sys:  /sys
    varlog: /var/log

# ---- PodDisruptionBudget ---------------------------------------------------
pdb:
  enabled: true
  maxUnavailable: 1

# ---- Update strategy -------------------------------------------------------
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# ---- Telemetry tuning (release-specific; verify against chart) -------------
telemetry:
  enabled: true
  # Example: per-flow-rate cap; raise for high-flow nodes (load balancers)
  # maxFlowsPerSecond: 50000
