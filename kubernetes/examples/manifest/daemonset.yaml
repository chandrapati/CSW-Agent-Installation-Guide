---
# CSW sensor DaemonSet — raw manifest for air-gapped / no-Helm shops.
#
# Apply order:
#   kubectl create namespace csw-sensor
#   kubectl label namespace csw-sensor pod-security.kubernetes.io/enforce=privileged
#   kubectl create secret generic csw-sensor-config -n csw-sensor \
#     --from-literal=cluster_endpoint=csw.example.com \
#     --from-literal=activation_key=<KEY> \
#     --from-file=ca.pem=./ca.pem
#   kubectl apply -f rbac.yaml
#   kubectl apply -f daemonset.yaml
#
# Edit `image:` to point at your mirrored registry.

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: csw-sensor
  namespace: csw-sensor
  labels:
    app: csw-sensor
spec:
  selector:
    matchLabels:
      app: csw-sensor
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: csw-sensor
    spec:
      serviceAccountName: csw-sensor
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: csw-sensor
          image: registry.internal.example.com/csw/sensor:3.x.y.z
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: CSW_CLUSTER_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: csw-sensor-config
                  key: cluster_endpoint
            - name: CSW_ACTIVATION_KEY
              valueFrom:
                secretKeyRef:
                  name: csw-sensor-config
                  key: activation_key
            - name: CSW_SCOPE
              value: "prod:k8s-cluster-A"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-varlog
              mountPath: /host/var/log
              readOnly: true
            - name: tetration-conf
              mountPath: /etc/tetration
            - name: csw-ca
              mountPath: /etc/tetration/ca.pem
              subPath: ca.pem
              readOnly: true
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-varlog
          hostPath:
            path: /var/log
        - name: tetration-conf
          emptyDir: {}
        - name: csw-ca
          secret:
            secretName: csw-sensor-config
            items:
              - key: ca.pem
                path: ca.pem
      imagePullSecrets:
        - name: internal-registry-pull

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: csw-sensor
  namespace: csw-sensor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: csw-sensor
