---
# RBAC for the CSW sensor DaemonSet.
# The sensor needs read access to nodes, pods, services, and namespaces
# so it can attribute flows to Kubernetes objects.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: csw-sensor
  namespace: csw-sensor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: csw-sensor
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "namespaces", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csw-sensor
subjects:
  - kind: ServiceAccount
    name: csw-sensor
    namespace: csw-sensor
roleRef:
  kind: ClusterRole
  name: csw-sensor
  apiGroup: rbac.authorization.k8s.io
