; Example inventory for the CSW sensor playbooks.
; Replace example hostnames with your real ones (or use a dynamic
; inventory plugin for AWS/Azure/GCP/VMware).

[csw_targets:children]
prod_linux
stage_linux
lab_linux

[lab_linux]
lab-host-[01:03].example.internal

[stage_linux]
stage-web-[01:05].example.internal
stage-app-[01:05].example.internal

[prod_linux:children]
prod_web
prod_app

[prod_web]
prod-web-[01:20].example.internal

[prod_app]
prod-app-[01:30].example.internal

[csw_targets:vars]
ansible_user=ansible
ansible_become=true
ansible_become_method=sudo
csw_cluster_fqdn=csw.example.com
